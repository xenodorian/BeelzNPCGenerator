<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPC DOSSIER GENERATOR</title>
    <style>
        :root {
            --bg-main: #090d16;
            --bg-surface: #131c2e;
            --border-color: #2c3b59;
            --accent: #00f0ff;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-sans);
            font-size: 14px;
            line-height: 1.5;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            text-transform: uppercase;
        }

        .system-status {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .workspace {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
            flex-grow: 1;
        }

        .panel-controls {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        select, input {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.75rem;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            outline: none;
            width: 100%;
            transition: border-color 0.15s ease;
        }

        select:focus, input:focus {
            border-color: var(--accent);
        }

        .control-hint {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: none;
            letter-spacing: 0;
        }

        .toggle-group {
            display: flex;
            border: 1px solid var(--border-color);
        }

        .toggle-btn {
            flex: 1;
            background-color: var(--bg-surface);
            color: var(--text-muted);
            border: none;
            padding: 0.65rem 0.5rem;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: background-color 0.15s ease, color 0.15s ease;
        }

        .toggle-btn + .toggle-btn {
            border-left: 1px solid var(--border-color);
        }

        .toggle-btn:hover {
            color: var(--text-main);
        }

        .toggle-btn.active {
            background-color: var(--accent);
            color: var(--bg-main);
            font-weight: 700;
        }

        .toggle-btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: -2px;
        }

        .btn-generate {
            background-color: var(--accent);
            color: var(--bg-main);
            border: none;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 1rem;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: opacity 0.15s ease;
        }

        .btn-generate:hover {
            opacity: 0.9;
        }

        .panel-output {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .dossier-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 1.5rem;
        }

        .npc-identity h2 {
            font-family: var(--font-mono);
            font-size: 2rem;
            line-height: 1.1;
            margin-bottom: 0.25rem;
        }

        .npc-meta {
            font-family: var(--font-mono);
            font-size: 0.875rem;
            color: var(--accent);
            text-transform: uppercase;
        }

        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .matrix-box {
            border: 1px solid var(--border-color);
            padding: 1rem;
        }

        .matrix-label {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            display: block;
        }

        .matrix-value {
            font-size: 1rem;
            font-weight: 500;
        }

        .profile-section {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .section-title {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.25rem;
            margin-bottom: 0.25rem;
        }

        .stat-block {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .stat-core {
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            text-align: center;
            padding: 0.5rem;
        }

        .stat-label {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            display: block;
            text-transform: uppercase;
        }

        .stat-mod {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--accent);
            display: block;
            margin-top: 0.1rem;
        }

        .stat-val {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: 700;
        }

        .vital-value {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .vital-value .vital-sub {
            font-family: var(--font-sans);
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-left: 0.4rem;
        }

        .attack-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .attack-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            padding: 0.6rem 0.85rem;
        }

        .multiattack-note {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--accent);
            font-style: italic;
            margin-bottom: 0.1rem;
        }

        .attack-name {
            font-weight: 500;
        }

        .attack-range {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .attack-stats {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--accent);
            text-align: right;
            white-space: nowrap;
        }

        .ability-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .ability-tag {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.35rem 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .ability-empty {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .spell-meta {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .spell-group {
            margin-top: 0.75rem;
        }

        .spell-group-label {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.03em;
            display: block;
            margin-bottom: 0.35rem;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .workspace { grid-template-columns: 1fr; }
            .stat-block { grid-template-columns: repeat(3, 1fr); }
            .attack-item { flex-direction: column; align-items: flex-start; gap: 0.25rem; }
            .attack-stats { text-align: left; }
        }
    </style>
</head>

            <button class="btn-generate" id="generateBtn">Construct Dossier</button>

        <div class="panel-output" id="dossierDisplay">

        // ─────────────────────────────────────────────────────────────────────────

        function crToNumber(crLabel) {
            if (crLabel === "1/8") return 0.125;
            if (crLabel === "1/4") return 0.25;
            if (crLabel === "1/2") return 0.5;
            return Number(crLabel);
        }

        // Cantrips scale at character levels 5/11/17 in 5e. CR and character level
        // are calibrated to the same rough scale (a CR X monster is a fair fight for
        // a level X party per the DMG's encounter-building guidelines), so the same
        // breakpoints are reused here against CR instead.
        function cantripTier(crEntry) {
            const crNumeric = crToNumber(crEntry.cr);
            if (crNumeric >= 17) return 4;
            if (crNumeric >= 11) return 3;
            if (crNumeric >= 5) return 2;
            return 1;
        }

        // Highest of INT/WIS/CHA picks the spell list: INT -> Wizard, WIS -> Druid,
        // CHA -> Bard. Ties favor INT, then WIS, over CHA.
        function getCasterClass(statVals) {
            const intVal = statVals[3], wisVal = statVals[4], chaVal = statVals[5];
            if (intVal >= wisVal && intVal >= chaVal) return 'wizard';
            if (wisVal >= chaVal) return 'druid';
            return 'bard';
        }

        // Standard 5e full-caster spell slot table (PHB multiclass spellcaster
        // table), indexed by caster level 1-20. Index 0 = 1st-level slots, etc.
        const spellSlotTable = {
            1: [2], 2: [3], 3: [4, 2], 4: [4, 3], 5: [4, 3, 2], 6: [4, 3, 3],
            7: [4, 3, 3, 1], 8: [4, 3, 3, 2], 9: [4, 3, 3, 3, 1], 10: [4, 3, 3, 3, 2],
            11: [4, 3, 3, 3, 2, 1], 12: [4, 3, 3, 3, 2, 1], 13: [4, 3, 3, 3, 2, 1, 1],
            14: [4, 3, 3, 3, 2, 1, 1], 15: [4, 3, 3, 3, 2, 1, 1, 1], 16: [4, 3, 3, 3, 2, 1, 1, 1],
            17: [4, 3, 3, 3, 2, 1, 1, 1, 1], 18: [4, 3, 3, 3, 3, 1, 1, 1, 1],
            19: [4, 3, 3, 3, 3, 2, 1, 1, 1], 20: [4, 3, 3, 3, 3, 2, 2, 1, 1]
        };

        // Maps CR to an effective spellcaster level. Calibrated against the
        // published CR 6 Mage, whose 4/3/3/3/1 slot spread is exactly a 9th-level
        // caster's — CR*1.5 lands on 9 at CR 6 and is held constant elsewhere,
        // since "all magic, no martial" NPCs cast well above their CR.
        function effectiveCasterLevel(crEntry) {
            const crNumeric = crToNumber(crEntry.cr);
            return Math.max(1, Math.min(20, Math.round(crNumeric * 1.5)));
        }

        function cantripsKnownCount(casterClass, level) {
            const tiers = casterClass === 'wizard' ? [3, 4, 5] : [2, 3, 4];
            if (level >= 10) return tiers[2];
            if (level >= 4) return tiers[1];
            return tiers[0];
        }

        function pickSpellCount(slots) {
            if (slots >= 4) return 3 + Math.floor(Math.random() * 2); // 3-4
            if (slots === 3) return 2 + Math.floor(Math.random() * 2); // 2-3
            if (slots === 2) return 2;
            return 1;
        }

        function ordinal(n) {
            const suffixes = { 1: 'st', 2: 'nd', 3: 'rd' };
            return n + (suffixes[n] || 'th');
        }

        // Official 5e proficiency bonus by CR (DMG p.274 "Proficiency Bonus" column).
        function proficiencyBonusForCR(crEntry) {
            const cr = crToNumber(crEntry.cr);
            if (cr >= 17) return 6;
            if (cr >= 13) return 5;
            if (cr >= 9) return 4;
            if (cr >= 5) return 3;
            return 2;
        }

        // INT/WIS/CHA index into statVals for each class's spellcasting ability.
        const SPELLCASTING_ABILITY_INDEX = { wizard: 3, druid: 4, bard: 5 };

        function buildSpellcasting(crEntry, statVals) {
            const casterClass = getCasterClass(statVals);
            const classData = classSpells[casterClass];
            const level = effectiveCasterLevel(crEntry);
            const slotsByLevel = spellSlotTable[level];
            const maxSpellLevel = slotsByLevel.length;

            // Spell attack bonus and save DC follow the real 5e formula:
            // attack = proficiency bonus + spellcasting ability modifier
            // DC     = 8 + proficiency bonus + spellcasting ability modifier
            const profBonus = proficiencyBonusForCR(crEntry);
            const abilityScore = statVals[SPELLCASTING_ABILITY_INDEX[casterClass]];
            const abilityMod = Math.floor((abilityScore - 10) / 2);
            const spellAttackBonus = profBonus + abilityMod;
            const spellSaveDC = 8 + profBonus + abilityMod;

            const cantripCount = cantripsKnownCount(casterClass, level);
            const allCantrips = [...classData.damageCantrips.map(c => c.name), ...classData.utilityCantrips];
            const cantrips = pickUnique(allCantrips, Math.min(cantripCount, allCantrips.length));

            const leveledGroups = [];
            for (let lvl = 1; lvl <= maxSpellLevel; lvl++) {
                const slots = slotsByLevel[lvl - 1];
                const pool = classData.levels[lvl] || [];
                const count = Math.min(pickSpellCount(slots), pool.length);
                leveledGroups.push({ level: lvl, slots, spells: pickUnique(pool, count) });
            }

            return {
                casterClass, classLabel: classData.label, casterLevel: level,
                profBonus, abilityMod, spellAttackBonus, spellSaveDC,
                cantrips, leveledGroups
            };
        }

        function formatMod(score) {
            const mod = Math.floor((score - 10) / 2);
            return mod >= 0 ? `+${mod}` : `${mod}`;
        }

        // Base 3d6-style roll (range 3-18) stays as the variance/spread, but a
        // CR-scaled bonus is added on top so higher-CR NPCs trend toward
        // genuinely better stats across the board — matching how real high-CR
        // creatures have markedly higher ability scores, not just more HP.
        // CR 0 gets +0 (classic 3-18 array); CR 20 gets +10 (13-28).
        function generateAttributes(crEntry) {
            const crNumeric = crToNumber(crEntry.cr);
            const crBonus = Math.min(10, Math.floor(crNumeric / 2));
            let values = [];
            for(let i=0; i<6; i++) {
                const roll = Math.floor(Math.random() * 6) + Math.floor(Math.random() * 6) + Math.floor(Math.random() * 6) + 3;
                values.push(roll + crBonus);
            }
            return values;
        }

        function pickUnique(pool, count) {
            const shuffled = [...pool].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, count);
        }

        function resolveCR(selection) {
            if (selection === 'random') {
                return crTable[Math.floor(Math.random() * crTable.length)];
            }
            return crTable.find(c => c.cr === selection) || crTable[0];
        }

        function pickArmor(crNumeric) {
            const eligible = armorTable.filter(a => a.minCR <= crNumeric);
            // weight toward the heavier end of what's eligible so higher-CR NPCs trend better-armored
            const pool = eligible.length > 3 ? eligible.slice(Math.max(0, eligible.length - 5)) : eligible;
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function calcArmorClass(armor, dexMod) {
            let dexContribution;
            if (armor.category === 'heavy') dexContribution = 0;
            else if (armor.category === 'medium') dexContribution = Math.min(dexMod, 2);
            else dexContribution = dexMod;
            const hasShield = Math.random() < 0.3;
            const ac = armor.base + dexContribution + (hasShield ? 2 : 0);
            return { ac, hasShield };
        }

        function parseDie(dieStr) {
            if (!dieStr.includes('d')) return { count: 0, size: 0, flat: Number(dieStr) };
            const [count, size] = dieStr.split('d').map(Number);
            return { count, size, flat: 0 };
        }

        function dieAverage(weapon) {
            const d = parseDie(weapon.die);
            return d.flat ? d.flat : d.count * (d.size + 1) / 2;
        }

        // Finesse weapons use whichever of STR/DEX is better; ranged weapons
        // always use DEX; everything else uses STR. statVals: STR,DEX,CON,INT,WIS,CHA.
        function weaponAbilityMod(weapon, statVals) {
            const strMod = Math.floor((statVals[0] - 10) / 2);
            const dexMod = Math.floor((statVals[1] - 10) / 2);
            if (weapon.ranged) return dexMod;
            if (weapon.finesse) return Math.max(strMod, dexMod);
            return strMod;
        }

        // STR-primary NPCs draw from weapons that are neither finesse nor ranged
        // (the weapons that actually want raw Strength). DEX-primary NPCs draw
        // from finesse and/or ranged weapons (anything that can use Dexterity).
        // Ties favor Strength. Within that set, weight toward the heaviest tier
        // currently unlocked by CR — same pattern as armor — so weapon choice
        // actually trends upward with CR instead of just being "eligible" the
        // whole time once unlocked.
        function pickWeapon(crNumeric, statVals) {
            const eligible = npcData.weaponPool.filter(w => w.minCR <= crNumeric);
            const strPrimary = statVals[0] >= statVals[1];
            const matching = strPrimary
                ? eligible.filter(w => !w.finesse && !w.ranged)
                : eligible.filter(w => w.finesse || w.ranged);
            const candidates = matching.length > 0 ? matching : eligible;
            const sorted = [...candidates].sort((a, b) => a.minCR - b.minCR);
            const pool = sorted.length > 3 ? sorted.slice(Math.max(0, sorted.length - 4)) : sorted;
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function weaponRangeLabel(weapon) {
            if (weapon.ranged) return weapon.range;
            return weapon.reach ? 'Melee (reach)' : 'Melee';
        }

        function weaponDamageString(weapon, abilityMod) {
            if (!weapon.die.includes('d')) {
                return `${Math.max(1, Number(weapon.die) + abilityMod)} ${weapon.type}`;
            }
            const modStr = abilityMod > 0 ? `+${abilityMod}` : (abilityMod < 0 ? `${abilityMod}` : '');
            return `${weapon.die}${modStr} ${weapon.type}`;
        }

        // Rather than inflating a weapon's dice to hit a CR damage budget, the
        // weapon's real damage stays accurate and the NPC instead makes more
        // attacks per turn (Multiattack) to reach roughly CR-appropriate total
        // damage output. Capped at 4 attacks to stay within realistic stat-block
        // norms — at very high CR with a light weapon this will undershoot the
        // budget rather than produce an absurd number of attacks.
        function computeAttackCount(weapon, abilityMod, crEntry) {
            const perHit = Math.max(1, dieAverage(weapon) + abilityMod);
            const targetTotal = (crEntry.dmgMin + crEntry.dmgMax) / 2;
            return Math.max(1, Math.min(4, Math.round(targetTotal / perHit)));
        }

        // HP is divided into one slice per CON modifier category (-4 through +4,
        // matching the 9 brackets reachable by this generator's 3-18 stat range).
        // The top category (CON 18, mod +4) reaches exactly hpMax — the CR's
        // existing ceiling — and each category below it gets its own exclusive,
        // progressively lower slice of the band, so CON keeps mattering all the
        // way down instead of saturating once it's a couple points above average.
        // HP is the low end of each slice: a static number per CR/CON pair, no roll.
        const CON_MOD_MIN = -4; // worst case: CON 3
        const CON_MOD_MAX = 4;  // best case: CON 18
        const CON_CATEGORIES = CON_MOD_MAX - CON_MOD_MIN + 1; // 9 brackets

        function hpFloorForMod(crEntry, conMod) {
            const clampedMod = Math.max(CON_MOD_MIN, Math.min(CON_MOD_MAX, conMod));
            const index = clampedMod - CON_MOD_MIN; // 0 (worst) to 8 (best)
            const sliceWidth = (crEntry.hpMax - crEntry.hpMin) / CON_CATEGORIES;
            return Math.round(crEntry.hpMin + index * sliceWidth);
        }

        function computeHP(crEntry, conScore, archetype) {
            const conMod = Math.floor((conScore - 10) / 2);
            const martialHP = hpFloorForMod(crEntry, conMod);
            return archetype === 'caster' ? Math.max(1, Math.round(martialHP / 2)) : martialHP;
        }

        function getArchetype(role) {
            return npcData.casterRoles.includes(role) ? 'caster' : 'martial';
        }

        function pickRole(archetypeFilter) {
            let pool = npcData.roles;
            if (archetypeFilter === 'martial') {
                pool = npcData.roles.filter(r => !npcData.casterRoles.includes(r));
            } else if (archetypeFilter === 'caster') {
                pool = npcData.roles.filter(r => npcData.casterRoles.includes(r));
            }
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function computeVitals(statVals, crEntry, archetype) {
            const dexMod = Math.floor((statVals[1] - 10) / 2);
            const conScore = statVals[2];
            const hp = computeHP(crEntry, conScore, archetype);
            const crNumeric = crToNumber(crEntry.cr);
            const armor = pickArmor(crNumeric);
            const { ac, hasShield } = calcArmorClass(armor, dexMod);
            return { hp, ac, armorName: armor.name, hasShield, crLabel: crEntry.cr };
        }

        // ─── DAMAGE BUFF HELPERS ─────────────────────────────────────────────────

        function pickEligiblePoison(crNumeric) {
            const eligible = poisonPool.filter(p => crNumeric >= p.minCR && crNumeric <= p.maxCR);
            return eligible.length ? eligible[eligible.length - 1] : null;
        }

        function pickMagicWeaponBonus(crNumeric) {
            const eligible = magicWeaponBonuses.filter(b => crNumeric >= b.minCR);
            return eligible.length ? eligible[eligible.length - 1] : null;
        }

        function pickSpecialWeapon(crNumeric) {
            const eligible = specialWeaponPool.filter(s => crNumeric >= s.minCR && !s.onCrit);
            if (!eligible.length) return null;
            return eligible[Math.floor(Math.random() * eligible.length)];
        }

        function dieAverageStr(dieStr) {
            if (!dieStr.includes('d')) return Number(dieStr);
            const [count, size] = dieStr.split('d').map(Number);
            return count * (size + 1) / 2;
        }

        // Returns average per-hit damage and a damage suffix string for display.
        // Buff families are chosen to get as close to the CR target as possible,
        // with multiattack filling the remaining gap.  Priority: try combinations
        // in order until the best fit is found (smallest |error| to target avg).
        function chooseMartialDamageStrategy(weapon, abilityMod, crEntry, statVals) {
            const crNumeric = crToNumber(crEntry.cr);
            const targetAvg = (crEntry.dmgMin + crEntry.dmgMax) / 2;
            const basePerHit = Math.max(1, dieAverage(weapon) + abilityMod);

            const isDexPrimary = statVals[1] > statVals[0] || weapon.finesse || weapon.ranged;

            // Candidate buff combinations to evaluate
            const candidates = [];

            // 0. Plain weapon — no buff
            candidates.push({ buffType: 'none', extraAvgPerHit: 0, extraDmgStr: '', hitBonusMod: 0, note: null });

            // A. Sneak Attack (skirmisher/DEX-primary only)
            if (isDexPrimary) {
                const saKey = Math.min(20, crNumeric < 0.5 ? 0.25 : Math.round(crNumeric));
                const saDie = sneakAttackByCR[saKey] || sneakAttackByCR[Math.floor(crNumeric)] || "1d6";
                const saAvg = dieAverageStr(saDie);
                candidates.push({ buffType: 'sneak', extraAvgPerHit: saAvg, extraDmgStr: `+ ${saDie} (Sneak Attack, once/turn — same type as weapon)`, hitBonusMod: 0, note: 'Sneak Attack' });
            }

            // B. Poison
            const poison = pickEligiblePoison(crNumeric);
            if (poison) {
                // Expected value: full on fail (avg saves at 50%), half on success → 0.75× avg
                const poisonExpected = poison.dmgAvg * 0.75;
                candidates.push({ buffType: 'poison', extraAvgPerHit: poisonExpected, extraDmgStr: `+ ${poison.dmg} ${poison.type} (DC ${poison.saveDC} save, half on success — ${poison.name})`, hitBonusMod: 0, note: `Poisoned weapon (${poison.name})` });
            }

            // C. Magic weapon bonus (adds to both hit and damage)
            const magicBonus = pickMagicWeaponBonus(crNumeric);
            if (magicBonus) {
                candidates.push({ buffType: 'magic', extraAvgPerHit: magicBonus.bonus, extraDmgStr: '', hitBonusMod: magicBonus.bonus, note: magicBonus.label, magicBonusVal: magicBonus.bonus });
            }

            // D. Special weapon
            const special = pickSpecialWeapon(crNumeric);
            if (special) {
                candidates.push({ buffType: 'special', extraAvgPerHit: special.avgExtra, extraDmgStr: `+ ${special.extraDie} ${special.extraType} (${special.name}${special.note ? '; ' + special.note : ''})`, hitBonusMod: 0, note: special.name });
            }

            // C+D combo (magic weapon + special extra damage)
            if (magicBonus && special) {
                candidates.push({ buffType: 'magic+special', extraAvgPerHit: magicBonus.bonus + special.avgExtra, extraDmgStr: `+ ${special.extraDie} ${special.extraType} (${special.name})`, hitBonusMod: magicBonus.bonus, note: `${magicBonus.label} — ${special.name}`, magicBonusVal: magicBonus.bonus });
            }

            // A+C combo (sneak attack + magic weapon)
            if (isDexPrimary && magicBonus) {
                const saKey = Math.min(20, crNumeric < 0.5 ? 0.25 : Math.round(crNumeric));
                const saDie = sneakAttackByCR[saKey] || sneakAttackByCR[Math.floor(crNumeric)] || "1d6";
                const saAvg = dieAverageStr(saDie);
                candidates.push({ buffType: 'sneak+magic', extraAvgPerHit: saAvg + magicBonus.bonus, extraDmgStr: `+ ${saDie} (Sneak Attack, once/turn — same type as weapon)`, hitBonusMod: magicBonus.bonus, note: `${magicBonus.label} — Sneak Attack`, magicBonusVal: magicBonus.bonus });
            }

            // For each candidate, find the attack count (1–4) that minimises |error| to targetAvg
            let best = null, bestError = Infinity;
            candidates.forEach(cand => {
                const effectivePerHit = basePerHit + cand.extraAvgPerHit;
                for (let count = 1; count <= 4; count++) {
                    const totalAvg = effectivePerHit * count;
                    const error = Math.abs(totalAvg - targetAvg);
                    if (error < bestError) {
                        bestError = error;
                        best = { ...cand, attackCount: count };
                    }
                }
            });

            return best || { buffType: 'none', extraAvgPerHit: 0, extraDmgStr: '', hitBonusMod: 0, note: null, attackCount: 1 };
        }

        // ─────────────────────────────────────────────────────────────────────────

        function buildAttacks(source, crEntry, archetype, statVals, spellcasting) {
            if (archetype === 'caster') {
                const count = Math.random() < 0.5 ? 1 : 2;
                const pool = classSpells[spellcasting.casterClass].damageCantrips;
                const chosen = pickUnique(pool, Math.min(count, pool.length));
                const tier = cantripTier(crEntry);
                return chosen.map(spell => ({
                    name: spell.name,
                    range: spell.range,
                    mechanic: spell.mechanic,
                    bonus: spell.mechanic === 'save' ? spellcasting.spellSaveDC : spellcasting.spellAttackBonus,
                    dmg: `${tier}d${spell.die} ${spell.type}`
                }));
            }

            const crNumeric = crToNumber(crEntry.cr);
            const weapon = pickWeapon(crNumeric, statVals);
            const abilityMod = weaponAbilityMod(weapon, statVals);
            const profBonus = proficiencyBonusForCR(crEntry);
            const strategy = chooseMartialDamageStrategy(weapon, abilityMod, crEntry, statVals);

            const hitBonus = profBonus + abilityMod + (strategy.hitBonusMod || 0);

            // Build the weapon name, decorating it if a magic property applies
            let weaponDisplayName = weapon.name;
            if (strategy.magicBonusVal) weaponDisplayName += ` +${strategy.magicBonusVal}`;
            else if (strategy.note && (strategy.buffType === 'special' || strategy.buffType === 'magic+special')) {
                // The special weapon replaces/enhances; display just the weapon name
            }

            // Build damage string
            const baseModStr = abilityMod > 0 ? `+${abilityMod}` : (abilityMod < 0 ? `${abilityMod}` : '');
            const bonusValStr = (strategy.magicBonusVal && abilityMod >= 0) ? `+${abilityMod + strategy.magicBonusVal}` :
                                (strategy.magicBonusVal && abilityMod < 0) ? `${abilityMod + strategy.magicBonusVal}` :
                                baseModStr;

            let baseDmgStr;
            if (!weapon.die.includes('d')) {
                baseDmgStr = `${Math.max(1, Number(weapon.die) + abilityMod + (strategy.magicBonusVal || 0))} ${weapon.type}`;
            } else {
                baseDmgStr = `${weapon.die}${bonusValStr ? bonusValStr : ''} ${weapon.type}`;
            }

            const fullDmgStr = strategy.extraDmgStr ? `${baseDmgStr} ${strategy.extraDmgStr}` : baseDmgStr;

            return [{
                name: weaponDisplayName,
                range: weaponRangeLabel(weapon),
                mechanic: 'attack',
                bonus: hitBonus,
                dmg: fullDmgStr,
                attackCount: strategy.attackCount,
                buffNote: strategy.note
            }];
        }

        function buildDossier() {
            let dispChoice = document.getElementById('disposition').value;
            
            if (dispChoice === 'any') {
                const keys = Object.keys(traits);
                dispChoice = keys[Math.floor(Math.random() * keys.length)];
            }

            const crEntry = resolveCR(document.getElementById('crSelect').value);
            const archetypeFilter = document.querySelector('#archetypeToggle .toggle-btn.active').dataset.value;

            const source = npcData;
            const name = source.givenNames[Math.floor(Math.random() * source.givenNames.length)]
                       + ' '
                       + source.surnames[Math.floor(Math.random() * source.surnames.length)];
            const ancestry = source.ancestry[Math.floor(Math.random() * source.ancestry.length)];
            const role = pickRole(archetypeFilter);
            const trait = traits[dispChoice][Math.floor(Math.random() * traits[dispChoice].length)];
            const hook = source.hooks[Math.floor(Math.random() * source.hooks.length)];
            const desire = source.desires[Math.floor(Math.random() * source.desires.length)];
            
            const statNames = source.stats;
            const statVals = generateAttributes(crEntry);
            const archetype = getArchetype(role);
            const spellcasting = archetype === 'caster' ? buildSpellcasting(crEntry, statVals) : null;
            const vitals = computeVitals(statVals, crEntry, archetype);
            const { hp, ac, armorName, hasShield, crLabel } = vitals;
            const attacks = buildAttacks(source, crEntry, archetype, statVals, spellcasting);
            const archetypeLabel = archetype === 'caster' ? `Caster (${spellcasting.classLabel})` : 'Martial';

            let statHTML = '';
            for(let i=0; i<6; i++) {
                statHTML += `
                    <div class="stat-core">
                        <span class="stat-label">${statNames[i]}</span>
                        <span class="stat-val">${statVals[i]}</span>
                        <span class="stat-mod">${formatMod(statVals[i])}</span>
                    </div>
                `;
            }

            let attackHTML = '';
            attacks.forEach(atk => {
                const bonusLabel = atk.mechanic === 'save'
                    ? `DC ${atk.bonus} save`
                    : `${atk.bonus >= 0 ? '+' : ''}${atk.bonus} to hit`;
                const multiattackNote = atk.attackCount > 1
                    ? `<div class="multiattack-note">Multiattack: ${atk.attackCount} ${atk.name} attacks per turn</div>`
                    : '';
                const buffNote = atk.buffNote
                    ? `<div class="multiattack-note" style="color:var(--text-muted)">\u25b8 ${atk.buffNote}</div>`
                    : '';
                attackHTML += `
                    ${multiattackNote}
                    ${buffNote}
                    <div class="attack-item">
                        <span class="attack-name">${atk.name} <span class="attack-range">(${atk.range})</span></span>
                        <span class="attack-stats">${bonusLabel} &nbsp;//&nbsp; ${atk.dmg}</span>
                    </div>
                `;
            });

            let abilityHTML = '';
            if (spellcasting) {
                const cantripGroup = `
                    <div class="spell-group">
                        <span class="spell-group-label">Cantrips (at will)</span>
                        <div class="ability-list">${spellcasting.cantrips.map(c => `<span class="ability-tag">${c}</span>`).join('')}</div>
                    </div>
                `;
                const leveledGroups = spellcasting.leveledGroups.filter(g => g.spells.length > 0).map(g => `
                    <div class="spell-group">
                        <span class="spell-group-label">${ordinal(g.level)} level (${g.slots} slot${g.slots > 1 ? 's' : ''})</span>
                        <div class="ability-list">${g.spells.map(s => `<span class="ability-tag">${s}</span>`).join('')}</div>
                    </div>
                `).join('');
                abilityHTML = `
                    <div class="spell-meta">${spellcasting.classLabel} spellcasting (${ordinal(spellcasting.casterLevel)}-level caster) — Spell save DC ${spellcasting.spellSaveDC}, +${spellcasting.spellAttackBonus} to hit with spell attacks</div>
                    ${cantripGroup}
                    ${leveledGroups}
                `;
            } else {
                abilityHTML = `<div class="ability-empty">Martial — no spellcasting capability.</div>`;
            }

            const hpSub = `<span class="vital-sub">CR ${crLabel}</span>`;
            const acSub = `<span class="vital-sub">${armorName}${hasShield ? ' + Shield' : ''}</span>`;

            const html = `
                <div class="dossier-header">
                    <div class="npc-identity">
                        <h2>${name}</h2>
                        <div class="npc-meta">${ancestry} // ${role} // ${archetypeLabel} // CR ${crLabel}</div>
                    </div>
                </div>

                <div class="matrix-grid">
                    <div class="matrix-box">
                        <span class="matrix-label">Social Presentation</span>
                        <div class="matrix-value">${trait} (${dispChoice})</div>
                    </div>
                    <div class="matrix-box">
                        <span class="matrix-label">Immediate Intent</span>
                        <div class="matrix-value">${desire}</div>
                    </div>
                    <div class="matrix-box">
                        <span class="matrix-label">${source.hpLabel}</span>
                        <div class="vital-value">${hp}${hpSub}</div>
                    </div>
                    <div class="matrix-box">
                        <span class="matrix-label">${source.acLabel}</span>
                        <div class="vital-value">${ac}${acSub}</div>
                    </div>
                </div>

                <div class="profile-section">
                    <span class="section-title">Complication / Hook</span>
                    <p>${hook}</p>
                </div>

                <div class="profile-section">
                    <span class="section-title">System Metrics</span>
                    <div class="stat-block">
                        ${statHTML}
                    </div>
                </div>

                <div class="profile-section">
                    <span class="section-title">Attacks</span>
                    <div class="attack-list">
                        ${attackHTML}
                    </div>
                </div>

                <div class="profile-section">
                    <span class="section-title">Spells & Cantrips</span>
                    ${abilityHTML}
                </div>
            `;

            document.getElementById('dossierDisplay').innerHTML = html;
        }

        function populateCRSelect() {
            const select = document.getElementById('crSelect');
            crTable.forEach(entry => {
                const opt = document.createElement('option');
                opt.value = entry.cr;
                opt.textContent = `CR ${entry.cr}`;
                select.appendChild(opt);
            });
        }

        function setupArchetypeToggle() {
            const buttons = document.querySelectorAll('#archetypeToggle .toggle-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
        }

        populateCRSelect();
        setupArchetypeToggle();
        document.getElementById('generateBtn').addEventListener('click', buildDossier);
        window.addEventListener('DOMContentLoaded', buildDossier);
    </script>
</body>
</html>
